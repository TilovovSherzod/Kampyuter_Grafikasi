{% extends "base_fragment.html" %}
{% block content %}
  <div class="container section-card">
    <h2 class="section-title">{{ item.title }}</h2>
    <p class="section-text">{{ item.description }}</p>
    {% if item.file %}
      <p><a class="btn btn-accent-outline" href="{{ item.file.url }}" download>Faylni yuklab olish</a></p>
    {% endif %}
    <div class="d-flex gap-2 flex-wrap">
      <a class="btn btn-accent" href="{% url 'core:test_take' item.pk %}">Testni boshlash</a>
      <a class="btn btn-accent-outline" href="{% url 'core:tests_list' %}">Ortga</a>
    </div>
  </div>
{% endblock %}
